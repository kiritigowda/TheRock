# hipblasltprovider
[components.lib."ml-libs/hipblasltprovider/stage"]
exclude = [
  "lib/*.a",
]
[components.dbg."ml-libs/hipblasltprovider/stage"]
[components.test."ml-libs/hipblasltprovider/stage"]
include = [
  "bin/hipblaslt_*_test*",
  # Bundle the entire bin/hipblaslt_plugin/ install tree so test_runner.py can
  # drive `ctest --test-dir bin/hipblaslt_plugin -L {quick|standard|...}` from
  # the rocm-libraries CMakeLists.txt-generated CTestTestfile.cmake.
  # Test config TOMLs (e.g. HIPBLASLT_ENGINE.toml) consumed by the cross-provider
  # integration suite (hipdnn_integration_tests --test-config) are picked up by
  # this glob as well.
  "bin/hipblaslt_plugin/**",
]
