# miopenprovider
# Note: The subproject builds as miopen_plugin in rocm-libraries but TheRock wraps it as miopenprovider
[components.lib."ml-libs/miopenprovider/stage"]
exclude = [
  "lib/*.a",
]
[components.dbg."ml-libs/miopenprovider/stage"]
[components.test."ml-libs/miopenprovider/stage"]
include = [
  "bin/miopen_plugin*_test*",
  # Install-tree CTest harness for test_runner.py (replaces the legacy
  # test_miopenprovider.py). Pulls in CTestTestfile.cmake plus any sibling
  # config TOMLs like MIOPEN_ENGINE.toml consumed by the cross-provider
  # integration suite (hipdnn_integration_tests --test-config).
  "bin/miopen_plugin/**",
]
