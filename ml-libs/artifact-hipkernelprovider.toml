# hipkernelprovider
[components.dbg."ml-libs/hipkernelprovider/stage"]
[components.lib."ml-libs/hipkernelprovider/stage"]
exclude = [
  "lib/*.a",
]
[components.test."ml-libs/hipkernelprovider/stage"]
include = [
  "bin/hip_kernel_provider*_test*",
  "bin/hip_kernel_provider/CTestTestfile.cmake",
  # Test config TOMLs (e.g. HIP_KERNEL_ENGINE.toml) consumed by the cross-provider
  # integration suite (hipdnn_integration_tests --test-config).
  "bin/hip_kernel_provider/*.toml",
]
