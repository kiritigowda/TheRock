name: CI Downstream Tests

on:
  workflow_dispatch:
    inputs:
      changed_artifacts:
        description: "Comma-separated artifact names from BUILD_TOPOLOGY (e.g., 'blas,prim')"
        required: true
        type: string
      artifact_run_id:
        description: "Workflow run ID to fetch build artifacts from"
        required: true
        type: string
      amdgpu_families:
        description: "Comma-separated GPU families or 'all'"
        required: false
        type: string
        default: "all"
      platform:
        description: "Target platform"
        required: false
        type: choice
        options:
          - linux
          - windows
        default: "linux"
      test_type:
        description: "Test type to run"
        required: false
        type: choice
        options:
          - full
          - comprehensive
          - standard
          - quick
        default: "full"
  pull_request:
    types: [labeled]

permissions:
  contents: read
  actions: read

jobs:
  configure:
    name: Configure downstream tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'ci:test-downstream')
    runs-on: ubuntu-latest
    outputs:
      test_labels: ${{ steps.configure.outputs.test_labels }}
      per_family_info: ${{ steps.configure.outputs.per_family_info }}
      has_tests: ${{ steps.configure.outputs.has_tests }}
      downstream_artifacts: ${{ steps.configure.outputs.downstream_artifacts }}
      artifact_run_id: ${{ steps.resolve_run_id.outputs.artifact_run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tomli

      - name: Detect changed files (PR trigger)
        id: changed_files
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the list of files changed in this PR
          FILES=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --name-only)
          # Write multiline output using delimiter
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "files<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$FILES"

      - name: Resolve artifact run ID
        id: resolve_run_id
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "artifact_run_id=${{ inputs.artifact_run_id }}" >> "$GITHUB_OUTPUT"
          else
            # Wait for a successful multi_arch_ci run matching the PR's HEAD commit
            PR_BRANCH="${{ github.event.pull_request.head.ref }}"
            PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            TIMEOUT=14400  # 4 hours
            INTERVAL=120   # check every 2 minutes
            ELAPSED=0

            echo "Looking for multi_arch_ci run on branch '$PR_BRANCH' at commit ${PR_HEAD_SHA:0:8}"

            while true; do
              # Get recent runs on the PR branch and find one matching the HEAD SHA
              RUN_INFO=$(gh run list \
                --repo "${{ github.repository }}" \
                --workflow multi_arch_ci.yml \
                --branch "$PR_BRANCH" \
                --limit 5 \
                --json databaseId,status,conclusion,headSha \
                --jq "[.[] | select(.headSha == \"$PR_HEAD_SHA\")] | .[0] // empty")

              if [[ -n "$RUN_INFO" && "$RUN_INFO" != "null" ]]; then
                RUN_ID=$(echo "$RUN_INFO" | jq -r '.databaseId')
                RUN_STATUS=$(echo "$RUN_INFO" | jq -r '.status')
                RUN_CONCLUSION=$(echo "$RUN_INFO" | jq -r '.conclusion // empty')

                if [[ "$RUN_STATUS" == "completed" && "$RUN_CONCLUSION" == "success" ]]; then
                  echo "artifact_run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
                  echo "Resolved artifact run ID: $RUN_ID (branch: $PR_BRANCH, commit: ${PR_HEAD_SHA:0:8})"
                  break
                elif [[ "$RUN_STATUS" == "completed" ]]; then
                  echo "::error::multi_arch_ci run $RUN_ID completed with conclusion '$RUN_CONCLUSION'. Fix the build before running downstream tests."
                  exit 1
                fi

                echo "Waiting for multi_arch_ci run $RUN_ID (status: $RUN_STATUS, elapsed: ${ELAPSED}s)..."
              else
                echo "No multi_arch_ci run found for commit ${PR_HEAD_SHA:0:8} yet (elapsed: ${ELAPSED}s)..."
              fi

              if [[ "$ELAPSED" -ge "$TIMEOUT" ]]; then
                echo "::error::Timed out waiting for multi_arch_ci to complete on branch '$PR_BRANCH' at commit ${PR_HEAD_SHA:0:8}."
                exit 1
              fi

              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done
          fi

      - name: Configure downstream tests
        id: configure
        env:
          CHANGED_ARTIFACTS: ${{ inputs.changed_artifacts || '' }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.files || '' }}
          AMDGPU_FAMILIES: ${{ inputs.amdgpu_families || 'all' }}
          PLATFORM: ${{ inputs.platform || 'linux' }}
        run: python build_tools/github_actions/configure_downstream_tests.py

      - name: Post summary
        run: |
          echo "## Downstream Test Configuration" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Changed artifacts:** \`${{ inputs.changed_artifacts || 'auto-detected from PR' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Artifact run ID:** \`${{ steps.resolve_run_id.outputs.artifact_run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Has tests:** \`${{ steps.configure.outputs.has_tests }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Downstream artifacts:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.configure.outputs.downstream_artifacts }}' >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Test labels:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.configure.outputs.test_labels }}' >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

  test_per_family:
    needs: [configure]
    if: ${{ needs.configure.outputs.has_tests == 'true' }}
    name: Test ${{ matrix.family_info.amdgpu_family }}
    strategy:
      fail-fast: false
      matrix:
        family_info: ${{ fromJSON(needs.configure.outputs.per_family_info) }}
    uses: ./.github/workflows/test_artifacts.yml
    with:
      artifact_group: ${{ matrix.family_info.amdgpu_family }}
      artifact_run_id: ${{ needs.configure.outputs.artifact_run_id }}
      amdgpu_families: ${{ matrix.family_info.amdgpu_family }}
      amdgpu_targets: ${{ matrix.family_info.amdgpu_targets }}
      test_runs_on: ${{ matrix.family_info.test-runs-on }}
      sanity_check_only_for_family: ${{ matrix.family_info.sanity_check_only_for_family }}
      test_type: ${{ inputs.test_type || 'full' }}
      test_labels: ${{ needs.configure.outputs.test_labels }}
