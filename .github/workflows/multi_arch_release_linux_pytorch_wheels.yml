# Multi-arch release entry point for Linux PyTorch wheels.
#
# This workflow owns the release matrix and delegates each matrix cell to the
# reusable single-build workflow. For convergence with CI and testing plans see:
# * https://github.com/ROCm/TheRock/issues/3332
# * https://github.com/ROCm/TheRock/issues/3291

name: Multi-Arch Release Linux PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type; selects the S3 bucket'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type ('none', 'sccache', or 'ccache')"
        type: string
        default: "sccache"
      python_version:
        description: "Single Python version to build (empty for full matrix)"
        type: string
        default: ""
      run_full_pytorch_tests:
        description: Run full PyTorch tests after scheduled nightly wheel builds complete.
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      release_type:
        description: 'Release type; developer-triggered jobs should use "dev"'
        type: choice
        options:
          - dev
        default: dev
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type"
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: sccache
      python_version:
        description: "Single Python version to build (empty for full matrix)"
        type: string
        default: ""
      run_full_pytorch_tests:
        description: Run full PyTorch tests after scheduled nightly wheel builds complete.
        type: boolean
        default: false

run-name: Release Linux PyTorch Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_families }})

permissions:
  contents: read

jobs:
  setup_matrix:
    runs-on: ubuntu-24.04
    outputs:
      pytorch_matrix: ${{ steps.matrix.outputs.pytorch_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Generate PyTorch matrix
        id: matrix
        run: |
          python ./build_tools/github_actions/configure_pytorch_release_matrix.py \
            --python-versions="${{ inputs.python_version }}" \
            --platform=linux

  build_pytorch_wheels:
    needs: setup_matrix
    name: Build | py ${{ matrix.python_version }} | torch ${{ matrix.pytorch_git_ref }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup_matrix.outputs.pytorch_matrix) }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/multi_arch_build_portable_linux_pytorch_wheels.yml
    with:
      amdgpu_families: ${{ inputs.amdgpu_families }}
      python_version: ${{ matrix.python_version }}
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      release_type: ${{ inputs.release_type }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref }}
      cache_type: ${{ inputs.cache_type }}

  dispatch_pytorch_wheels_full_test:
    name: Dispatch PyTorch Full Test | gfx94X-dcgpu | torch ${{ matrix.pytorch_git_ref }}
    # Existing rockrel wrappers do not pass run_full_pytorch_tests, so this
    # remains a no-op until the companion rockrel wrapper PR enables the flag
    # and provides test_pytorch_wheels_full.yml in that repository.
    if: >-
      ${{
        inputs.run_full_pytorch_tests &&
        inputs.release_type == 'nightly' &&
        needs.build_pytorch_wheels.result == 'success'
      }}
    needs: [build_pytorch_wheels]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - pytorch_git_ref: release/2.9
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.9.*"
            dispatch_on: daily
          - pytorch_git_ref: release/2.10
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.10.*"
            dispatch_on: daily
          - pytorch_git_ref: release/2.11
            pytorch_git_repo: ROCm/pytorch
            torch_package: "torch==2.11.*"
            dispatch_on: daily
          - pytorch_git_ref: nightly
            pytorch_git_repo: pytorch/pytorch
            torch_package: "torch"
            dispatch_on: sunday
    env:
      PACKAGE_INDEX_URL: "https://rocm.nightlies.amd.com/whl-multi-arch/"
      PYTHON_VERSION: "3.12"
      TORCH_PACKAGE: ${{ matrix.torch_package }}
    steps:
      - name: Check full test cadence
        id: cadence
        run: |
          if [ "${{ matrix.dispatch_on }}" = "daily" ] || [ "$(date -u +%u)" = "7" ]; then
            echo "dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve torch version
        if: ${{ steps.cadence.outputs.dispatch == 'true' }}
        id: resolve
        run: |
          REPORT_PATH="${RUNNER_TEMP}/torch-install-report.json"

          python -m pip install "${TORCH_PACKAGE}" \
            --dry-run \
            --ignore-installed \
            --no-deps \
            --only-binary=:all: \
            --pre \
            --index-url "${PACKAGE_INDEX_URL}" \
            --python-version "${PYTHON_VERSION}" \
            --platform linux_x86_64 \
            --report "${REPORT_PATH}"

          TORCH_VERSION=$(python -c 'import json, sys; print(json.load(open(sys.argv[1]))["install"][0]["metadata"]["version"])' "${REPORT_PATH}")

          if [ -z "${TORCH_VERSION}" ]; then
            echo "::error::Failed to resolve ${TORCH_PACKAGE} from ${PACKAGE_INDEX_URL}"
            exit 1
          fi

          echo "torch_version=${TORCH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved torch_version: ${TORCH_VERSION}"

      - name: Dispatch full PyTorch test workflow
        if: ${{ steps.cadence.outputs.dispatch == 'true' }}
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
        with:
          workflow: test_pytorch_wheels_full.yml
          inputs: |
            { "amdgpu_family": "gfx94X-dcgpu",
              "test_runs_on": "linux-gfx942-1gpu-ossci-rocm",
              "test_runs_on_multi_gpu": "linux-gfx942-8gpu-ossci-rocm",
              "package_index_url": "${{ env.PACKAGE_INDEX_URL }}",
              "python_version": "3.12",
              "torch_version": "${{ steps.resolve.outputs.torch_version }}",
              "pytorch_git_ref": "${{ matrix.pytorch_git_ref }}",
              "pytorch_git_repo": "${{ matrix.pytorch_git_repo }}",
              "test_configs": "default distributed inductor",
              "tests_to_include": "",
              "multi_arch": true,
              "repository": "${{ inputs.repository || github.repository }}",
              "ref": "${{ inputs.ref }}"
            }
