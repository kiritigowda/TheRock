# Multi-arch release entry point for Linux PyTorch wheels.
#
# This workflow owns the release matrix and delegates each matrix cell to the
# reusable single-build workflow. For convergence with CI and testing plans see:
# * https://github.com/ROCm/TheRock/issues/3332
# * https://github.com/ROCm/TheRock/issues/3291

name: Multi-Arch Release Linux PyTorch Wheels

on:
  workflow_call:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages (flat page; use this OR rocm_package_index_url)
        type: string
        default: ""
      rocm_package_index_url:
        description: URL for pip --index-url to install ROCm packages (PEP 503 index, e.g. repo.amd.com; use this OR rocm_package_find_links_url)
        type: string
        default: ""
      release_type:
        description: 'Release type; selects the S3 bucket'
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type ('none', 'sccache', or 'ccache')"
        type: string
        default: "sccache"
      python_version:
        description: "Single Python version to build (empty for full matrix)"
        type: string
        default: ""
      run_full_pytorch_tests:
        description: Run full PyTorch tests after scheduled nightly wheel builds complete.
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake.
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages (flat page; use this OR rocm_package_index_url)
        type: string
        default: ""
      rocm_package_index_url:
        description: URL for pip --index-url to install ROCm packages (PEP 503 index, e.g. repo.amd.com; use this OR rocm_package_find_links_url)
        type: string
        default: ""
      release_type:
        description: 'Release type; developer-triggered jobs should use "dev"'
        type: choice
        options:
          - dev
        default: dev
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout. Defaults to the triggering ref."
        type: string
        default: ""
      cache_type:
        description: "Compiler cache type"
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: sccache
      python_version:
        description: "Single Python version to build (empty for full matrix)"
        type: string
        default: ""
      run_full_pytorch_tests:
        description: Run full PyTorch tests after scheduled nightly wheel builds complete.
        type: boolean
        default: false

run-name: Release Linux PyTorch Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, ${{ inputs.amdgpu_families }})

permissions:
  contents: read

jobs:
  setup_matrix:
    runs-on: ubuntu-24.04
    outputs:
      pytorch_matrix: ${{ steps.matrix.outputs.pytorch_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Generate PyTorch matrix
        id: matrix
        run: |
          python ./build_tools/github_actions/configure_pytorch_release_matrix.py \
            --python-versions="${{ inputs.python_version }}" \
            --platform=linux \
            --amdgpu-families="${{ inputs.amdgpu_families }}"

  build_pytorch_wheels:
    needs: setup_matrix
    name: Build | py ${{ matrix.python_version }} | torch ${{ matrix.pytorch_git_ref }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup_matrix.outputs.pytorch_matrix) }}
    permissions:
      id-token: write
      contents: read
      # Granted so the reusable build workflow's dispatch_pytorch_wheels_full_test
      # job can trigger the full test workflow (a reusable workflow's job cannot
      # request more permissions than its caller grants).
      actions: write
    uses: ./.github/workflows/multi_arch_build_portable_linux_pytorch_wheels.yml
    with:
      amdgpu_families: ${{ matrix.amdgpu_families }}
      python_version: ${{ matrix.python_version }}
      pytorch_git_ref: ${{ matrix.pytorch_git_ref }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      rocm_package_index_url: ${{ inputs.rocm_package_index_url }}
      release_type: ${{ inputs.release_type }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref }}
      cache_type: ${{ inputs.cache_type }}
      # The reusable build workflow dispatches the full PyTorch test suite for
      # each successfully built (nightly, gfx94X-dcgpu, py3.12) ref using that
      # build's own torch_version output (#5777).
      run_full_pytorch_tests: ${{ inputs.run_full_pytorch_tests }}
