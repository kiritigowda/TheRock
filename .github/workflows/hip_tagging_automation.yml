name: Hip tagging automation

on:
  push:
    branches:
      - main
    paths:
        - rocm-systems

jobs:
  tag-rocm-systems:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout ROCm/TheRock
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ secrets.ROCM_SYSTEMS_APP_ID }}
          private-key: ${{ secrets.ROCM_SYSTEMS_APP_PRIVATE_KEY }}
          owner: "ROCm"
          repositories: "rocm-systems"

      - name: Install dependencies
        run: |
          pip install PyGithub

      - name: Run tagging script
        run: |
          python build_tools/github_actions/hip_tagging_helper.py \
            --repo "${{ github.repository }}" \
            --before "${{ github.event.before }}" \
            --after "${{ github.sha }}" \
            --pat "${{ steps.generate-token.outputs.token }}"
