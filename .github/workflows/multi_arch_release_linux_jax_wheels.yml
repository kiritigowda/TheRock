# Multi-arch release entry point for Linux JAX wheels.
#
# This workflow owns the release matrix and delegates each matrix cell to the
# reusable single-build workflow.

name: Multi-Arch Release Linux JAX Wheels

on:
  workflow_call:
    inputs:
      test_amdgpu_family:
        description: "GPU family to use for JAX tests; empty means skip tests."
        type: string
        default: ""
      release_type:
        description: 'Release type: "dev", "nightly", or "prerelease".'
        type: string
        required: true
      rocm_version:
        description: "ROCm package version to build against."
        type: string
        required: true
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      tar_url:
        description: "URL to the TheRock tarball used for the build."
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout."
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      test_amdgpu_family:
        description: "Representative GPU family to use for JAX tests."
        type: string
        default: "gfx94X-dcgpu"
      release_type:
        description: 'Release type; developer-triggered jobs should use "dev".'
        type: choice
        options:
          - dev
        default: dev
      rocm_version:
        description: "ROCm package version to build against."
        type: string
        required: true
      rocm_package_find_links_url:
        description: "URL for pip --find-links to install ROCm packages for the JAX manylinux build."
        type: string
        default: ""
      tar_url:
        description: "URL to the TheRock tarball used for the build."
        type: string
        required: true
      repository:
        description: "Repository to checkout. Defaults to github.repository."
        type: string
        default: ""
      ref:
        description: "Branch, tag, or SHA to checkout."
        type: string
        default: ""

run-name: Release Linux JAX Wheels (${{ inputs.release_type }}, ${{ inputs.rocm_version }}, Multiarch)

permissions:
  contents: read
jobs:
  build_jax_wheels:
    name: Build | py ${{ matrix.python_version }} | jax ${{ matrix.jax_ref }}
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.11", "3.12", "3.13", "3.14"]
        jax_ref:
          - "rocm-jaxlib-v0.9.1"
          - "rocm-jaxlib-v0.10.0"
          - "rocm-jaxlib-v0.10.2"
        include:
          - jax_ref: "rocm-jaxlib-v0.9.1"
            jax_repository: "ROCm/rocm-jax"
            build_mode: "native"
            gfx_arch: ""

          - jax_ref: "rocm-jaxlib-v0.10.0"
            jax_repository: "ROCm/jax"
            build_mode: "manylinux"
            gfx_arch: "device-all"

          - jax_ref: "rocm-jaxlib-v0.10.2"
            jax_repository: "ROCm/jax"
            build_mode: "manylinux"
            gfx_arch: "device-all"

    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/multi_arch_build_linux_jax_wheels.yml
    with:
      test_amdgpu_family: ${{ inputs.test_amdgpu_family }}
      python_version: ${{ matrix.python_version }}
      jax_ref: ${{ matrix.jax_ref }}
      jax_repository: ${{ matrix.jax_repository }}
      build_mode: ${{ matrix.build_mode }}
      gfx_arch: ${{ matrix.gfx_arch }}
      rocm_version: ${{ inputs.rocm_version }}
      rocm_package_find_links_url: ${{ inputs.rocm_package_find_links_url }}
      tar_url: ${{ inputs.tar_url }}
      release_type: ${{ inputs.release_type }}
      repository: ${{ inputs.repository || github.repository }}
      ref: ${{ inputs.ref }}
