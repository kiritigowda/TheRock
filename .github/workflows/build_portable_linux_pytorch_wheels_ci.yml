# CI variant of build_portable_linux_pytorch_wheels.yml.
#
# Key differences from the release workflow:
#   - Installs ROCm packages via --find-links (CI artifacts) instead of
#     --index-url (release index)
#   - Builds torch only (no torchvision, torchaudio, or triton)
#   - No S3 upload, staging, testing, or promotion — just build + sanity check
#   - Uses sccache with S3-backed storage (configurable via cache_type input)
#
# TODO(#3291): Build more packages (torchvision, torchaudio, triton, etc.)
#
# Both workflows share build_prod_wheels.py for the actual build logic.
# See https://github.com/ROCm/TheRock/issues/3291 for convergence plans.

name: Build Portable Linux PyTorch Wheels (CI)

on:
  workflow_call:
    inputs:
      artifact_group:
        type: string
        required: true
      python_version:
        type: string
        default: "3.12"
      pytorch_git_ref:
        description: PyTorch ref to checkout (typically "release/X.Y")
        type: string
        default: "release/2.10"
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      cache_type:
        description: "Compiler cache type (sccache, ccache, or none)"
        required: false
        type: string
        default: "none"
      amdgpu_families:
        description: >-
          Semicolon-separated list of AMD GPU families to build PyTorch for
          (e.g. 'gfx94X-dcgpu;gfx120X-all'). Expanded to gfx targets at
          build time via cmake/therock_amdgpu_targets.cmake. Leave empty
          for legacy callers that rely on build_prod_wheels.py's
          `rocm-sdk targets` fallback.
        type: string
        default: ""
      kpack_split:
        description: "'true' if this is a kpack-split flat build."
        type: string
        default: "false"
      release_type:
        description: >-
          Release type used to pick the AWS role for S3 uploads
          (forwarded to configure_aws_artifacts_credentials). Empty for
          CI runs that should skip the upload.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      artifact_group:
        description: "The artifact group to build (e.g. gfx94X-dcgpu, gfx120X-all)"
        type: string
        default: gfx94X-dcgpu
      python_version:
        type: string
        default: "3.12"
      pytorch_git_ref:
        description: PyTorch ref to checkout (typically "release/X.Y")
        type: string
        default: "release/2.10"
      rocm_package_find_links_url:
        description: URL for pip --find-links to install ROCm packages
        type: string
        required: true
      rocm_version:
        description: ROCm package version to install and build against (e.g. 7.10.0.dev0)
        type: string
        required: true
      cache_type:
        description: "Compiler cache type"
        type: choice
        options:
          - none
          - sccache
          - ccache
        default: none

run-name: Build portable Linux PyTorch Wheels CI (${{ inputs.artifact_group }}, py${{ inputs.python_version }}, ${{ inputs.pytorch_git_ref }})

jobs:
  build_pytorch_wheels:
    name: Build PyTorch | ${{ inputs.artifact_group }} | torch ${{ inputs.pytorch_git_ref }} | py${{ inputs.python_version }}
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    permissions:
      id-token: write
      contents: read
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:702a5133851e6d1daf1207d2c9fbb01c2667914a5b6dc5a01faeb3ce66ea6421
    env:
      PACKAGE_DIST_DIR: ${{ github.workspace }}/output/packages/dist
      optional_build_prod_arguments: ""
      SCCACHE_BUCKET: therock-ci-pytorch-sccache
      SCCACHE_REGION: us-east-2
      SCCACHE_S3_KEY_PREFIX: "linux/${{ inputs.artifact_group }}/"
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_SERVER_SIDE_ENCRYPTION: "true"
      SCCACHE_IDLE_TIMEOUT: "600"
      SCCACHE_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Git Identity
        run: |
          git config --global user.name "therockbot"
          git config --global user.email "therockbot@amd.com"

      - name: Select Python version
        run: |
          python build_tools/github_actions/python_to_cp_version.py \
            --python-version ${{ inputs.python_version }}

      - name: Add selected Python version to PATH
        run: |
          python_dir="/opt/python/${{ env.cp_version }}"
          if ! [ -x "${python_dir}/bin/python" ]; then
            echo "ERROR: Could not find python: ${python_dir}"
            exit 1
          fi
          echo "${python_dir}/bin" >> "$GITHUB_PATH"

      - name: Install python deps for CI
        run: |
          pip install -r external-builds/pytorch/requirements-ci.txt

      - name: Checkout PyTorch source (nightly)
        if: ${{ inputs.pytorch_git_ref == 'nightly' }}
        run: |
          ./external-builds/pytorch/pytorch_torch_repo.py checkout \
            --repo-hashtag nightly

      - name: Checkout PyTorch source (stable)
        if: ${{ inputs.pytorch_git_ref != 'nightly' }}
        run: |
          ./external-builds/pytorch/pytorch_torch_repo.py checkout \
            --gitrepo-origin https://github.com/ROCm/pytorch.git \
            --repo-hashtag ${{ inputs.pytorch_git_ref }}

      # Note: determine_version.py sets optional_build_prod_arguments in
      # GITHUB_ENV, which includes --rocm-sdk-version and --version-suffix.
      - name: Determine optional arguments passed to `build_prod_wheels.py`
        if: ${{ inputs.rocm_version }}
        run: |
          python build_tools/github_actions/determine_version.py \
            --rocm-version ${{ inputs.rocm_version }}

      - name: Configure AWS Credentials for sccache
        if: ${{ inputs.cache_type == 'sccache' && github.repository_owner == 'ROCm' }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::692859939525:role/therock-ci

      - name: Verify sccache
        if: ${{ inputs.cache_type == 'sccache' }}
        run: |
          echo "sccache version: $(sccache --version)"
          echo "SCCACHE_BUCKET=${SCCACHE_BUCKET}"
          echo "SCCACHE_S3_KEY_PREFIX=${SCCACHE_S3_KEY_PREFIX}"

      - name: Expand amdgpu families to gfx targets
        if: ${{ inputs.amdgpu_families != '' }}
        id: expand
        run: |
          targets=$(python build_tools/github_actions/expand_amdgpu_families.py \
            --amdgpu-families "${{ inputs.amdgpu_families }}")
          echo "Expanded families '${{ inputs.amdgpu_families }}' -> '${targets}'"
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

      # inputs.amdgpu_families is only populated by the multi-arch caller
      # today. Legacy single-family CI (ci_linux.yml) leaves it empty and
      # falls back to `rocm-sdk targets` inside build_prod_wheels.py.
      # TODO(#4687): Make --pytorch-rocm-arch required here once every
      # caller plumbs the value through and the fallback in
      # build_prod_wheels.py::get_rocm_sdk_targets is removed.
      - name: Build PyTorch wheels
        run: |
          cache_flag=""
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            cache_flag="--use-sccache"
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            cache_flag="--use-ccache"
          fi

          pytorch_rocm_arch_flag=""
          if [ -n "${{ steps.expand.outputs.targets }}" ]; then
            pytorch_rocm_arch_flag="--pytorch-rocm-arch ${{ steps.expand.outputs.targets }}"
          fi

          ./external-builds/pytorch/build_prod_wheels.py \
            build \
            --install-rocm \
            --find-links "${{ inputs.rocm_package_find_links_url }}" \
            --clean \
            --output-dir ${{ env.PACKAGE_DIST_DIR }} \
            ${cache_flag} \
            ${pytorch_rocm_arch_flag} \
            ${{ env.optional_build_prod_arguments }}

      - name: Report cache stats
        if: ${{ !cancelled() && inputs.cache_type != 'none' }}
        run: |
          if [ "${{ inputs.cache_type }}" = "sccache" ]; then
            echo "sccache stats:"
            echo "--------------"
            sccache --show-stats || true
          elif [ "${{ inputs.cache_type }}" = "ccache" ]; then
            echo "ccache stats:"
            echo "-------------"
            ccache -s -v || true
          fi

      - name: Sanity check wheel
        run: |
          python external-builds/pytorch/sanity_check_wheel.py \
            ${{ env.PACKAGE_DIST_DIR }}/

      # The kpack wheel splitter takes the fat torch wheel and produces a
      # smaller host wheel plus one device wheel per gfx target. Source-install
      # from the TheRock checkout — kpack has no published wheel today.
      # The outer actions/checkout skips submodules for speed, so pull in
      # rocm-systems only when we actually need it.
      - name: Init rocm-systems submodule
        if: ${{ inputs.kpack_split == 'true' }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --depth=1 rocm-systems

      - name: Install kpack tooling
        if: ${{ inputs.kpack_split == 'true' }}
        run: |
          pip install \
            -e rocm-systems/python/rocm-bootstrap \
            -e rocm-systems/shared/kpack

      - name: Split PyTorch fat wheel
        if: ${{ inputs.kpack_split == 'true' }}
        run: |
          # The splitter writes the host wheel under the same filename as the
          # input, so relocate the fat wheel out of PACKAGE_DIST_DIR first.
          FAT_STAGE="${RUNNER_TEMP:-/tmp}/pytorch-fat"
          mkdir -p "${FAT_STAGE}"
          mv ${{ env.PACKAGE_DIST_DIR }}/torch-*.whl "${FAT_STAGE}/"

          ROCM_SDK_VERSION="$(python -m rocm_sdk version)"

          python -m rocm_kpack.tools.split_python_wheels \
            --input "${FAT_STAGE}"/torch-*.whl \
            --output-dir "${{ env.PACKAGE_DIST_DIR }}" \
            --device-package-prefix amd-torch-device \
            --overlay-root torch/ \
            --wheel-type torch-fat \
            --device-requires-dist "rocm-sdk-device-@GFXARCH@ == ${ROCM_SDK_VERSION}" \
            --compression zstd \
            -j "$(nproc)"

          rm -rf "${FAT_STAGE}"
          echo "Post-split contents of ${{ env.PACKAGE_DIST_DIR }}:"
          ls -lh "${{ env.PACKAGE_DIST_DIR }}/"

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure_aws_artifacts_credentials
        with:
          release_type: ${{ inputs.release_type }}

      # Appends to the same therock-ci-artifacts/<run>-linux/python/ prefix
      # that the ROCm python job already populated — one find-links URL
      # covers the whole SDK + PyTorch stack.
      - name: Upload PyTorch wheels
        run: |
          python build_tools/github_actions/upload_python_packages.py \
            --input-packages-dir="${{ env.PACKAGE_DIST_DIR }}" \
            --artifact-group="${{ inputs.artifact_group }}" \
            --run-id="${{ github.run_id }}" \
            --multiarch
